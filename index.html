{title:"GitHubの使い方",date:"2026-07-12",text:"ヴォージュ広場にて執筆したものに帰宅後加筆。オランジュリー美術館を予約しているので、その前にアラブ世界研究所に行こうと思っていたのだけれど、その前に運河とヴォージュ広場を見ておこうと思って、運河を通りヴォージュ広場まで来た。ヴォージュ広場はとても良い。アンティークな建物にぐるりと囲われていて、上から水が流れるフォンデュ式の噴水が４つある。中心には木で囲われて隠れた銅像があって、周囲は四角く刈り取られた木が並んでいて、その下にベンチがあるる。人がたくさんゆっくりしている。たくさんの人がゆっくりしているんじゃなくて、人がたくさんゆっくりしている。芝生の上で、大勢だったりひとりだったり。人々の姿勢は日本のお花見と似ているけれど、イベントではなくて日常感がある。運河沿いを歩きながらも思ったけれど、パリでは時間が人間の中に存在しているように感じる。日本では時間は過ぎていくもので定規みたいな感じだった。よく伊勢神宮の式年遷宮の例を出して、日本では循環する時間観があると言われるけれど、それは定規を何回も何回も継ぎ足して距離を測るようなものだと思う。現代文の授業とか入試の評論文では、ヨーロッパでは通時的に一直線の時間が存在しているという説明が多かったけれど、ちょっと違うと、ここでは私は思う。時間についてずっと、パンテオンで見た振り子時計のイメージが離れない。終わりもはじまりもなく、ぐるぐると重みを持って動き続ける。その時間を測るのは、自分の外側にある尺ではなくて、自分自身の目と心の側にある感じがする。時間に対してルーズというよりかは、自分自身と同じように、大事にしているということなんだと思う。バゲットを持ってきていたので、ここで食べようと思ったのだけれど、昨日の夜遅くまで旅行について調べていて眠いし、歩いているときにコーヒーを片手にしている人たちをたくさん見かけて、私もここでコーヒーを飲みたいと強く思った。近くにあるカフェでテイクアウトする。お持ち帰りできますか？がフランス語で言えなかったので英語でお願いしたけれど、アオンポホテというらしいので次から使いたい。この場所で文章を書こうと思ったのは、芝生の上でのお父さんと女の子の様子を見て、自分が小さかった頃のことを思い出したからだ。女の子は5歳くらいで、ピンクのズボンを着ていて、笑ったりでんぐり返しをしたりして、お父さんはその手を引いて起こしたり、笑いかけたりしていた。私もそうだったなと思った。当時は何とも思わなかったけれど、私の父は、私が小さい頃、よく一緒に遊んでくれたし、あんなふうに嬉しそうに私のことを見ていたなと思った。母もそうだった。母も私のことを楽しませようとしてくれていた。縄跳びで父に負けて（当たり前）泣いて母に慰めてもらったり、母と一緒に段ボールで家を作ったり、自転車の乗り方を公園で教えてもらったり、なんだか急に色んなことを思い出した。そして、それは、今でもふたりとも何も変わっていないのだと思う。父は今でも私と出かけると嬉しそうだし、もう25歳になるのにまだ学生をやっている私のことを支えてくれている。母も多分今頃寂しがっていて、たくさん家族LINEを送ってくる。でも今では私は、ふたりに対して、なんだかすごく冷めた気持ちを持っている。今さっきまで目の前にいたピンクのズボンの女の子がお父さんに笑いかけていたみたいに、純粋に両親のことが大好きだったはずなのに、どうしてこうなってしまったのだろう。母に対しては、母の娘としての自分は死んだと思うと言って、個人LINEをブロックして留学に来てしまった。本当にそんな気分だったから。私の母としての役目を終えて、自分の好きな方向へと人生を進めようとしている母は少し前よりも楽しそうで、人としては応援したいかもと思う反面、娘としては、心配だし、私の過去と思考回路を知りながら気持ちをあまりにも思いやってくれないことに心がどんどん消耗していった。私が好きだった、私のことを第一に考えてくれる母は死んだんだと思って、でも時々見せてくれる優しさに、死んだ人が生き返ったみたいな心の揺さぶられ方をするのもつらかった。留学に行く直前に、母が理不尽に怒り出して話し合ってくれずにLINEで私のことを罵った時に、ぷつりと音がして、母の側がいなくなったのではなくて、私の側がいなくなったと考えるほうが、心が揺さぶられなくて楽だと思った。それは母にとっても良いことだろうと思った。私が母に期待するところから、全ての衝突が生まれてきたから。父に対しては関わることが苦しいと思うほどの感情はないけれど、なんだか自分を支援してくれている人という感覚が強くなりすぎている気がしている。ここ数年の関係と、今の自分の気持ちだけを考えると、私たち家族の状況はよくなくて、私は留学でフランスにいることで忘れたり距離を取ろうとしている。私の人生の時間感覚は切れ切れだと思ってきた。特に中学生以前の記憶は、人間関係が継続していないので、思い出せば鮮明だけれど、他人のものか、あるいは私が作り出した物語のようなものに思えるときがある。写真や書いた日記などがなければ、それが確かにあった事実だという感じがしない。今、生まれてからずっと続いている唯一の関係である親子関係を遠ざけようとしていて、そうしてしまえば、本当に、過去の記憶は自分のものではなくなってしまう気がしていた。嫌な時間の記憶や関係はすべて、自分から切り離そうとする癖が私にはあって、それは良いことではないと思いながらも、今まで生き延びるためにどうしても必要な処世術だと思い込んできた。だけれど、その癖が今、家族関係にまで及ぼうとしているところでフランスにきて、人々を見て、なんだか違う時間の感覚を発見して、何かおかしいんじゃないかと、少し立ち止まっている。時間が物差しを並べたようなものではなくて、天文学的な動きを読むための振り子みたいなものだったとしたら、切ってどこかに捨ててしまうという発想はなくなる。全ての時間やその時間のなかでの人との関係は、それを目や体や心で追ってきた、私の主体性によって動き続けていて、継ぎ目はないんだと思い直すことができたら。遠ざけたように思えても今でも自分に影響を与え続けているという意味で、すべてのことが切れていないことを認めれば、今では簡単に会うことができなくなった人たちのことを思ってももう寂しくはないだろうし、無闇に過去や人を遠ざけようとしなくてもよくなるのかもしれない。嫌なことの原因は、時間や関係のなかに置かれているのではなくて、自分のなかにあることを認めてもいいかもしれない。その方が生きている感じがする。母の娘としての私も、私の母としての母も、父の娘としての私も、私の父としての父も、最初から居なくて、ただ3人がそれぞれの時間を生きているなかでたまたま家族というものが作られたんだと考えれば、もう期待もせず、誰のことも嫌いにならずにいられような気がする。広場という同じ場所に集まって、それぞれの時間を過ごしている、たくさんの人々と同じイメージ。遠ざかることはできるけれどそれが終わりではなくて、ただ、どこに居るか、というそのままの問題なんだなと思うと、気が楽になる。スマホに文章を打ち込む手に、木漏れ日の影が落ちて綺麗。オランジュリーに行かなくちゃいけない時間になったのでアラブ世界研究所は後回しにする。

{title:"今日の勉強",date:"2026-07-11",text:"JavaScriptでカードをクリックすると詳細表示する仕組みを学びました。",youtube:"https://www.youtube.com/embed/dQw4w9WgXcQ"},

const list=document.getElementById("list"),s=document.getElementById("search");
function draw(){
list.innerHTML="";
memos.filter(m=>(m.title+m.text).toLowerCase().includes(s.value.toLowerCase())).forEach(m=>{
let c=document.createElement("div");c.className="card";
c.innerHTML=`<div class=title>${m.title}</div><div class=date> ${m.date}</div><div class=preview>${m.text.substring(0,20)}...</div><div class=detail><p>${m.text}</p>${m.image?`<img src="${m.image}">`:""}${m.youtube?`<iframe height="315" src="${m.youtube}" allowfullscreen></iframe>`:""}</div>`;
c.onclick=()=>{let d=c.querySelector(".detail");d.style.display=d.style.display=="block"?"none":"block";}
list.appendChild(c);});
}
s.oninput=draw;draw();
</script></body></html>
